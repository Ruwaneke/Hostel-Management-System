openapi: 3.0.3
info:
  title: Hostel Management System - Room Allocation API
  version: 1.0.0
  description: Swagger documentation for the Room Management module.
paths:
  /api/rooms:
    get:
      summary: Get all rooms
      tags: [Rooms]
      responses:
        '200':
          description: A list of all rooms
    post:
      summary: Create a new room
      tags: [Rooms]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RoomCreateUpdateRequest'
      responses:
        '201':
          description: Room created successfully
        '400':
          description: Room number already exists
        '500':
          description: Server error

  /api/rooms/{id}:
    get:
      summary: Get room by ID
      tags: [Rooms]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The room ID
      responses:
        '200':
          description: Room details returned successfully
        '404':
          description: Room not found

    put:
      summary: Update a room
      tags: [Rooms]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The room ID
      requestBody:
        required: false
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RoomCreateUpdateRequest'
      responses:
        '200':
          description: Room updated successfully
        '404':
          description: Room not found

    delete:
      summary: Delete a room
      tags: [Rooms]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The room ID
      responses:
        '200':
          description: Room deleted successfully
        '404':
          description: Room not found

components:
  schemas:
    RoomCreateUpdateRequest:
      type: object
      properties:
        block:
          type: string
          example: "A"
        roomNumber:
          type: string
          example: "101"
        floorLevel:
          type: string
          example: "1st Floor"
        roomType:
          type: string
          example: "Shared"
        designatedGender:
          type: string
          example: "Male"
        airConditioning:
          type: string
          example: "AC"
        bathroomType:
          type: string
          example: "Attached"
        furnishing:
          type: string
          description: "Comma-separated list of furnishings"
          example: "Bed,Wardrobe,Study Table"
        hasBalcony:
          type: boolean
          example: true
        bedCount:
          type: integer
          example: 2
        tableCount:
          type: integer
          example: 2
        chairCount:
          type: integer
          example: 2
        monthlyRent:
          type: number
          example: 15000
        keyMoney:
          type: number
          example: 50000
        maxCapacity:
          type: integer
          example: 2
        description:
          type: string
          example: "A spacious room with a view."
        status:
          type: string
          example: "Available"
        display:
          type: string
          description: "Send as 'true' or 'false' string"
          example: "true"
        image:
          type: string
          format: binary
          description: "Upload room image"